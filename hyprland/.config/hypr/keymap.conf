# See https://wiki.hyprland.org/Configuring/Binds/
# NOTE: use `wev` to see key names
#
# NOTE: Bind Flags (https://wiki.hypr.land/Configuring/Binds/#bind-flags)
# l  locked            Will also work when an input inhibitor (e.g. a lockscreen) is active.
# r  release           Will trigger on release of a key.
# c  click             Will trigger on release of a key or button as long as the mouse cursor stays inside binds:drag_threshold.
# g  drag              Will trigger on release of a key or button as long as the mouse cursor moves outside binds:drag_threshold.
# o  long press        Will trigger on long press of a key.
# e  repeat            Will repeat when held.
# n  non-consuming     Key/mouse events will be passed to the active window in addition to triggering the dispatcher.
# m  mouse             See the dedicated Mouse Binds section.
# t  transparent       Cannot be shadowed by other binds.
# i  ignore mods       Will ignore modifiers.
# s  separate          Will arbitrarily combine keys between each mod/key, see Keysym combos.
# d  has description   Will allow you to write a description for your bind.
# p  bypass            Bypasses the app’s requests to inhibit keybinds.
# u  submap universal  Will be active no matter the submap.

# Make alt-backspace behave like ctrl-backspace (needs extended-keys in tmux)
# bind = ALT, Backspace, sendshortcut, CTRL, Backspace,

## Power management
bind = SUPER, Backspace, exec, kitty --class=widget.screensaver -o background_opacity=1 -o background=black -e cmatrix -bsk
bind = CTRL SUPER, Backspace, exec, hyprclose class:widget.powermenu || kitty --class=widget.powermenu -e powermenu
bind = CTRL SUPER, Q, exec, loginctl lock-session

## Applications
# hyprctl clients -j | jq '.[].class'
bind = SUPER, W, exec, pkill gnome-weather || uwsm app -- gnome-weather
bind = CTRL SUPER, W, exec, pkill waybar || uwsm app -- waybar
bind = SUPER, E, exec, hyprfocus class:org.gnome.Nautilus || uwsm app -- nautilus
bind = CTRL SUPER, E, exec, uwsm app -- nautilus --new-window
bind = CTRL SUPER, R, exec, screenrecord
bind = SUPER, T, exec, hyprclose class:widget.btop || kitty --class=widget.btop -e btop
bind = CTRL SUPER, T, exec, hyprclose class:widget.btop || kitty --class=widget.btop -e htop

bind = SUPER, A, exec, hyprclose class:widget.wiremix || kitty --class=widget.wiremix -e wiremix
bind = SHIFT SUPER, A, exec, hyprfocus class:org.pulseaudio.pavucontrol || uwsm app -- pavucontrol
bind = SUPER, S, exec, hyprfocus class:steam || uwsm app -- steam
bind = CTRL SUPER, S, exec, hyprfocus class:org.gnome.Settings || XDG_CURRENT_DESKTOP=GNOME gnome-control-center
bind = SUPER, D, exec, hyprfocus class:com.mitchellh.ghostty || uwsm app -- ghostty
bind = CTRL SUPER, D, exec, uwsm app -- ghostty
bind = SUPER, F, exec, hyprfocus class:zen || uwsm app -- zen-browser
bind = CTRL SUPER, F, exec, uwsm app -- zen-browser --private-window
bind = SUPER, G, exec, hyprfocus class:chromium || uwsm app -- chromium
bind = CTRL SUPER, G, exec, uwsm app -- chromium --incognito

bind = SUPER, X, exec, hyprfocus class:localsend || GTK_THEME=Adwaita:dark uwsm app -- localsend
bind = SUPER, C, exec, hyprclose class:widget.fn || kitty --class=widget.fn -e opencode --agent plan ~/code/
bind = CTRL SUPER, C, exec, hyprclose class:widget.calc || kitty --class=widget.calc -e calc
bind = SHIFT SUPER, C, exec, hyprfocus class:org.gnome.Calendar || uwsm app -- gnome-calendar
bind = SUPER, B, exec, vicinae_toggle deeplink vicinae://launch/@Gelei/store.vicinae.bluetooth/devices
bind = CTRL SUPER, B, exec, hyprclose class:widget.bluetui || kitty --class=widget.bluetui -e bluetui
bind = SUPER, V, exec, vicinae_toggle deeplink vicinae://launch/clipboard/history
bind = CTRL SUPER, V, exec, hyprclose "class:Mullvad VPN" || mullvad-vpn

bind = CTRL SUPER, Y, exec, hyprclose class:widget.btop || kitty --class=widget.btop -e yazi
bind = SUPER, I, exec, screenshot output
bind = SHIFT SUPER, I, exec, screenshot window
bind = CTRL SUPER, I, exec, screenshot region
bind = SUPER, O, exec, hyprclose class:widget.fn || kitty --class=widget.fn -e fn
bind = CTRL SUPER, O, exec, hyprfocus class:obsidian || uwsm app -- obsidian
bind = SUPER, P, exec, hyprfocus class:1Password || uwsm app -- 1password
bind = SHIFT SUPER, P, exec, hyprpicker --autocopy

bind = CTRL SUPER, Space, exec, vicinae toggle
bind = CTRL SHIFT, Space, exec, vicinae_toggle deeplink vicinae://launch/core/search-emojis

bind = SUPER, N, exec, swaync-client -t -sw
bind = CTRL SUPER, N, exec, swaync-client -C
bind = SHIFT SUPER, N, exec, swaync-client -d

bind = , Print, exec, screenshot output
bind = SUPER, Print, exec, screenshot window
bind = CTRL, Print, exec, screenshot region

## Window management
bind = SUPER, Q, killactive,
bind = CTRL SUPER, X, forcekillactive,
bind = SUPER, M, fullscreen, 1
bind = CTRL SUPER, M, fullscreen, 0
bind = SUPER, R, togglesplit, # dwindle

# alt tab
binde = ALT, Tab, cyclenext
binde = ALT, Tab, bringactivetotop

bind = ALT SHIFT, Tab, cyclenext, prev
bind = ALT SHIFT, Tab, bringactivetotop

# window resizing
bind = SUPER, right, resizeactive, 300 0
bind = SUPER, left, resizeactive, -300 0
bind = SUPER, down, resizeactive, 0 100
bind = SUPER, up, resizeactive, 0 -100

# move focus with vim keys
bind = SUPER, H, movefocus, l
bind = SUPER, J, movefocus, d
bind = SUPER, K, movefocus, u
bind = SUPER, L, movefocus, r

# swap windows
bind = SHIFT SUPER, H, swapwindow, l
bind = SHIFT SUPER, J, swapwindow, d
bind = SHIFT SUPER, K, swapwindow, u
bind = SHIFT SUPER, L, swapwindow, r

# move/resize windows with mouse
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
bindm = CTRL SUPER, mouse:273, resizewindow 1  # keep aspect ratio

# Floating windows
bind = SUPER, Y, togglefloating,

# move window
bind = CTRL SUPER, down, setfloating,
bind = CTRL SUPER, down, movewindow, d

bind = CTRL SUPER, left, setfloating,
bind = CTRL SUPER, left, movewindow, l

bind = CTRL SUPER, right, setfloating,
bind = CTRL SUPER, right, movewindow, r

bind = CTRL SUPER, up, setfloating,
bind = CTRL SUPER, up, movewindow, u

# centerwindow (floating only)
bind = SUPER, comma, setfloating,
bind = SUPER, comma, centerwindow,

bind = CTRL SUPER, comma, setfloating,
bind = CTRL SUPER, comma, resizeactive, exact 75% 75%
bind = CTRL SUPER, comma, centerwindow,

# pin floating window to all spaces
bind = CTRL SUPER, P, setfloating,
bind = CTRL SUPER, P, pin,

## Workspaces
# focus workspace
bind = CTRL SUPER, L, workspace, +1
bind = CTRL SUPER, H, workspace, -1

bind = SUPER, Space, workspace, previous

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9

# move window to workspace
bind = CTRL SUPER, K, movetoworkspace, +1
bind = CTRL SUPER, J, movetoworkspace, -1

bind = SUPER, Tab, movetoworkspace, empty
bind = SUPER, Return, movetoworkspacesilent, empty

bind = SHIFT SUPER, 1, movetoworkspace, 1
bind = SHIFT SUPER, 2, movetoworkspace, 2
bind = SHIFT SUPER, 3, movetoworkspace, 3
bind = SHIFT SUPER, 4, movetoworkspace, 4
bind = SHIFT SUPER, 5, movetoworkspace, 5
bind = SHIFT SUPER, 6, movetoworkspace, 6
bind = SHIFT SUPER, 7, movetoworkspace, 7
bind = SHIFT SUPER, 8, movetoworkspace, 8
bind = SHIFT SUPER, 9, movetoworkspace, 9

# special workspace (scratchpad)
# bind = SUPER, I, togglespecialworkspace, magic
# bind = SHIFT SUPER, I, movetoworkspacesilent, special:magic

# mouse quick switch
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1

## Media keys
# Only display the OSD on the currently focused monitor
$osdclient = swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')"

# Laptop multimedia keys for volume and LCD brightness (with OSD)
bindeld = ,XF86AudioRaiseVolume, Volume up, exec, $osdclient --output-volume raise
bindeld = ,XF86AudioLowerVolume, Volume down, exec, $osdclient --output-volume lower
bindeld = ,XF86AudioMute, Mute, exec, $osdclient --output-volume mute-toggle
bindeld = ,XF86AudioMicMute, Mute microphone, exec, $osdclient --input-volume mute-toggle
bindeld = ,XF86MonBrightnessUp, Brightness up, exec, $osdclient --brightness raise
bindeld = ,XF86MonBrightnessDown, Brightness down, exec, $osdclient --brightness lower

# Precise 1% multimedia adjustments
bindeld = CTRL, XF86AudioRaiseVolume, Volume up precise, exec, $osdclient --output-volume +1
bindeld = CTRL, XF86AudioLowerVolume, Volume down precise, exec, $osdclient --output-volume -1
bindeld = CTRL, XF86MonBrightnessUp, Brightness up precise, exec, $osdclient --brightness +1
bindeld = CTRL, XF86MonBrightnessDown, Brightness down precise, exec, $osdclient --brightness -1

# Requires playerctl
bindld = , XF86AudioNext, Next track, exec, $osdclient --playerctl next
bindld = , XF86AudioPause, Pause, exec, $osdclient --playerctl play-pause
bindld = , XF86AudioPlay, Play, exec, $osdclient --playerctl play-pause
bindld = , XF86AudioPrev, Previous track, exec, $osdclient --playerctl previous

